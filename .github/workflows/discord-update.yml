name: Discord Notification

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build Discord message
        id: message
        run: |
          echo "MSG=**${{ github.event_name }}** in \`$GITHUB_REPOSITORY\`" >> $GITHUB_OUTPUT
          
          # Handle push events
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "MSG+=\n✅ Commit by \`$GITHUB_ACTOR\`: [${{ github.sha }}]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/${{ github.sha }})"
            echo "MSG+=\n> **Message:** \`$GITHUB_HEAD_REF\`" # Using GITHUB_HEAD_REF instead of message
            echo "MSG+=\n> [View Commit]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/${{ github.sha }})"
          # Handle PR events
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "MSG+=\n💥 PR by \`$GITHUB_ACTOR\`: [#${{ github.event.number }}]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/pull/${{ github.event.number }})"
            echo "MSG+=\n> **Title:** \`${{ github.event.pull_request.title | truncate(50) }}\`"
            echo "MSG+=\n> [View PR]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/pull/${{ github.event.number }})"
          fi
          
          # Output the final message
          echo "FINAL_MESSAGE=${{ steps.message.outputs.MSG }}" >> $GITHUB_OUTPUT
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}

      - name: Send Discord Notification
        uses: appleboy/discord-action@v4.1.1
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          message: ${{ steps.message.outputs.FINAL_MESSAGE }}