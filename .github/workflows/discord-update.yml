name: Discord Notification

on:
  push:
    branches:
      - main  # Trigger on commits to main branch
  pull_request:
    types: [opened, reopened, synchronize]  # Also trigger on PRs

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Set up message content
        id: set_message
        run: |
          EVENT_NAME="${{ github.event_name | replace('_', ' ') }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          COMMIT_MESSAGE="${{ github.head_commit.message }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          SERVER_URL="${{ github.server_url }}"

          if [ "$EVENT_NAME" == "push" ]; then
            MESSAGE="**$EVENT_NAME** in \`$REPO\`
Commit by \`$ACTOR\`: [$SHA]($SERVER_URL/$REPO/commit/$SHA)
> **Message:** \`$COMMIT_MESSAGE\`
> [View Commit]($SERVER_URL/$REPO/commit/$SHA)"
          else
            MESSAGE="**$EVENT_NAME** in \`$REPO\`
PR by \`$ACTOR\`: [#${PR_NUMBER}]($SERVER_URL/$REPO/pull/${PR_NUMBER})
> **Title:** \`${PR_TITLE:0:50}\`
> [View PR]($SERVER_URL/$REPO/pull/${PR_NUMBER})"
          fi

          echo "MESSAGE=$MESSAGE" >> $GITHUB_ENV

      - name: Send Discord Notification
        uses: appleboy/discord-action@v1.20.0