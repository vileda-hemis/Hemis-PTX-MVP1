name: Discord Notification

on:
  push:
    branches:
      - main  # Trigger on commits to main branch
  pull_request:
    types: [opened, reopened, synchronize]  # Also trigger on PRs

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        uses: appleboy/discord-action@v1.20.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          args: |
            **${{ github.event_name | replace('_', ' ') }}** in `{{ github.repository }}`
            {% if github.event_name == 'push' %}
              Commit by `{{ github.actor }}`: [{{ github.sha | truncate(7) }}]({{ github.server_url }}/{{ github.repository }}/commit/{{ github.sha }})
              > **Message:** `{{ github.head_commit.message | truncate(50) }}`  
                [View Commit]({{ github.server_url }}/{{ github.repository }}/commit/{{ github.sha }})
            {% else %}
              PR by `{{ github.actor }}`: [#{{ github.event.pull_request.number }}]({{ github.server_url }}/{{ github.repository }}/pull/{{ github.event.pull_request.number }})
              > **Title:** `{{ github.event.pull_request.title | truncate(50) }}`  
                [View PR]({{ github.server_url }}/{{ github.repository }}/pull/{{ github.event.pull_request.number }})
            {% endif %}