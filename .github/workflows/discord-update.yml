name: Discord Notification

on:
  push:
    branches:
      - main  # Trigger on commits to main branch1
  pull_request:
    types: [opened, reopened, synchronize]  # Also trigger on PRs

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Set up event details
        id: setup_event
        run: |
          EVENT_NAME=$(echo "${GITHUB_EVENT_NAME}" | sed 's/_/ /g')
          SHA=${{ github.sha }}
          TRUNCATED_SHA=${SHA:0:7}
          COMMIT_MESSAGE=${{ github.head_commit.message }}
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE=${{ github.event.pull_request.title }}
          SERVER_URL=${{ github.server_url }}
          REPO=${{ github.repository }}
          ACTOR=${{ github.actor }}

          if [ "${GITHUB_EVENT_NAME}" == "push" ]; then
            MESSAGE="**${EVENT_NAME}** in \`${REPO}\`
Commit by \`${ACTOR}\`: [${TRUNCATED_SHA}](${SERVER_URL}/${REPO}/commit/${SHA})
> **Message:** \`${COMMIT_MESSAGE}\`
> [View Commit](${SERVER_URL}/${REPO}/commit/${SHA})"
          else
            MESSAGE="**${EVENT_NAME}** in \`${REPO}\`
PR by \`${ACTOR}\`: [#${PR_NUMBER}](${SERVER_URL}/${REPO}/pull/${PR_NUMBER})
> **Title:** \`${PR_TITLE:0:50}\`
> [View PR](${SERVER_URL}/${REPO}/pull/${PR_NUMBER})"
          fi

          echo "MESSAGE=${MESSAGE}" >> $GITHUB_ENV

      - name: Send Discord Notification
        uses: appleboy/discord-action@v1.20.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          args: |
            ${MESSAGE}