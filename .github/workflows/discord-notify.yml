# Credit: Vileda
name: Discord Commit Notification

on:
  push:
    branches:
      - 'ptx-**'
      - 'feature/ptx-**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send commit notification to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # Pass via env so the shell never sees raw substitution — safe against
          # apostrophes, em-dashes, backticks, and other special chars in commit text.
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
          RAW_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          COMMIT_MSG=$(jq -nr --arg msg "$RAW_COMMIT_MSG" '$msg | split("\n")[0]')
          AUTHOR="$RAW_AUTHOR"
          SHORT_SHA='${{ github.sha }}'
          SHORT_SHA="${SHORT_SHA:0:7}"
          BRANCH='${{ github.ref_name }}'
          REPO='${{ github.repository }}'
          URL='${{ github.event.head_commit.url }}'

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"New commit on ${BRANCH}\",
                \"description\": \"${COMMIT_MSG}\",
                \"color\": 11878460,
                \"fields\": [
                  {
                    \"name\": \"Author\",
                    \"value\": \"${AUTHOR}\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Commit\",
                    \"value\": \"[${SHORT_SHA}](${URL})\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Repo\",
                    \"value\": \"${REPO}\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Hemis PTX\"
                }
              }]
            }"
